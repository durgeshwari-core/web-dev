<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event bubbling</title>
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .main{
            width: 100%;
            height: 100%;
            background-color: #222;
        }
        .nav{
            background-color: white;
            display: flex;
            justify-content: space-between;

        }
        a{
            background-color: black;
            color: white;
        }
        button{
            padding: 12px 20px;
            background-color: gray;
            border: 2px solid rgb(20, 3, 36);
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="nav"><a href="">home</a>
            <a href="">about</a>
            <button>click and follow</button>
        </div>
    </div>
    <script src="7_bubbling.js"></script>
</body>

</html>
